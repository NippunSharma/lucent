<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nippun Sharma</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e14;
      --surface: #16161f;
      --border: rgba(255,255,255,0.06);
      --text: #e8e8f0;
      --muted: #8888a8;
      --accent: #8b5cf6;
      --accent-glow: rgba(139,92,246,0.25);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px var(--accent-glow);
      border: 3px solid var(--accent);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.4rem; }
    .tagline { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .links a {
      display: block;
      padding: 0.85rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .links a:hover {
      border-color: rgba(139,92,246,0.3);
      background: rgba(139,92,246,0.06);
      transform: translateY(-1px);
    }

    .lucent-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2rem;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.25s;
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    .lucent-cta:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .lucent-cta svg { width: 18px; height: 18px; }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar"><img src="/static/nippun_profile.jpeg" alt="Nippun Sharma" /></div>
    <h1>Nippun Sharma</h1>
    <p class="tagline">Machine Learning Engineer</p>

    <div class="links">
      <a href="https://github.com/NippunSharma" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com/in/nippun-sharma" target="_blank" rel="noopener">LinkedIn</a>
    </div>

    <a href="/lucent/" class="lucent-cta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/>
        <path d="M18 14l1 3 3 1-3 1-1 3-1-3-3-1 3-1z"/>
      </svg>
      Try Lucent
    </a>
  </div>

  <footer>&copy; 2026 Nippun Sharma. All rights reserved.</footer>
</body>
</html>
